<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; overflow-x: hidden; overflow-y: auto; position: relative; }
    canvas { display: block; position: relative; z-index: 1; }

    /* Detroit map — sits behind canvas, scrolls with page content */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('images/detroit-map.jpg') no-repeat center top / cover;
      opacity: 0.6;
      pointer-events: none;
      z-index: 0;
    }

    #ui {
      position: absolute;
      z-index: 100;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    @media (max-width: 479px) {
      #ui {
        position: fixed;
        top: 12px;
        left: 12px;
        transform: none !important;
      }
    }
    #ui button {
      pointer-events: all;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(0, 195, 210, 0.5);
      color: rgba(0, 195, 210, 0.8);
      font-family: 'Inconsolata', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    @media (max-width: 479px) {
      #ui button {
        font-size: 14px;
        padding: 6px 14px;
      }
    }
    #ui button:hover {
      border-color: rgba(0, 195, 210, 1);
      color: rgba(0, 195, 210, 1);
    }

    /* ── Intro overlay ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.96);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 40px max(32px, calc(50% - 310px));
      gap: 40px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    #intro.visible {
      opacity: 1;
      pointer-events: all;
    }
    #intro.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #intro-text {
      font-family: 'Inconsolata', monospace;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: rgba(0, 0, 0, 0.75);
      max-width: 620px;
      text-align: left;
      line-height: 1.7;
      min-height: 3em;
      transition: opacity 0.4s ease;
    }
    #intro-text.fade {
      opacity: 0;
    }
    #intro-buttons {
      display: flex;
      gap: 8px;
      width: 620px;
      max-width: calc(100vw - 96px);
    }
    #intro-prev,
    #intro-next {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(0, 195, 210, 0.5);
      color: rgba(0, 195, 210, 0.8);
      font-family: 'Inconsolata', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    @media (max-width: 479px) {
      #intro-prev, #intro-next {
        font-size: 14px;
        padding: 6px 14px;
      }
    }
    #intro-prev:hover,
    #intro-next:hover {
      border-color: rgba(0, 195, 210, 1);
      color: rgba(0, 195, 210, 1);
    }
    #intro-prev.ghosted {
      opacity: 0.2;
      cursor: default;
      pointer-events: none;
    }
    #intro-skip {
      margin-left: auto;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(0, 195, 210, 0.5);
      color: rgba(0, 195, 210, 0.8);
      font-family: 'Inconsolata', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    @media (max-width: 479px) {
      #intro-skip {
        font-size: 14px;
        padding: 6px 14px;
      }
    }
    #intro-skip:hover {
      border-color: rgba(0, 195, 210, 1);
      color: rgba(0, 195, 210, 1);
    }
    #intro-dots {
      display: flex;
      gap: 6px;
    }
    .intro-dot {
      width: 5px;
      height: 5px;
      border: 1px solid rgba(0, 195, 210, 0.5);
      background: none;
      transition: background 0.3s;
    }
    .intro-dot.active {
      background: rgba(0, 195, 210, 0.8);
    }
  </style>
</head>
<body>
<div id="intro">
  <div id="intro-dots"></div>
  <div id="intro-text"></div>
  <div id="intro-buttons">
    <button id="intro-prev" class="ghosted">&lt;</button>
    <button id="intro-next">[NEXT]</button>
    <button id="intro-skip">[SKIP]</button>
  </div>
</div>
<div id="ui">
  <button onclick="showIntro()">[HOME]</button>
  <button onclick="randomizeGrid()">[RANDOMIZE SET]</button>
</div>
<script>
// ─── CONFIGURATION ────────────────────────────────────────────────────────────
const CELL_SIZE   = 40;    // thumbnail size in px (width = height)
const GAP         = 20;    // space between cells (where the bracket markers sit)
const GRID_COLS   = 13;    // max columns (used at ≥ 1920px)
const GRID_ROWS   = 13;    // fixed number of rows

// All available images — shuffled so the grid shows a random selection each load
const ALL_IMAGES = Array.from({ length: 800 }, (_, i) =>
  `images/${String(i + 1).padStart(3, "0")}.jpg`
);
let PHOTOS = ALL_IMAGES.slice().sort(() => Math.random() - 0.5).slice(0, GRID_COLS * GRID_ROWS);
const PLUS_SIZE      = 4;    // half-length of each plus arm
const HOVER_MAX      = 1.20; // max scale boost for the cell under the cursor
const HOVER_RADIUS   = 80;   // px — distance over which magnification falls off
const MARKER_COL  = [0, 195, 210]; // cyan RGB

// ─── STATE ────────────────────────────────────────────────────────────────────
let imgs           = [];
let hoverT         = [];
let lightboxIdx    = -1;
let lightboxT      = 0;
let ripples        = [];
let cols, rows, canvasH, gridOffsetY;
let eCellSize, eGap; // effective (scaled) cell size and gap

// intro animation
let introProgress   = []; // 0‒1 fade-in progress per thumbnail
let introStartFrame = []; // frame at which each thumbnail begins fading in
let plusRotT        = []; // 0‒1 hover lerp per plus sign
let plusSpinProg    = []; // 0‒1 progress through the 2-turn spin animation
let plusSpinStart   = []; // frame each plus begins spinning
const PLUS_SPIN_DUR     = 50;  // frames per plus to complete 2 turns
const PLUS_SPIN_STAGGER = 0.8; // frames between each diagonal step

const INTRO_STAGGER  = 0.5; // frames between each thumbnail fade-in
const INTRO_DURATION = 12;  // frames each fade takes

// No preload — images load asynchronously so the sketch starts immediately

// ─── SETUP ────────────────────────────────────────────────────────────────────
function setup() {
  calcLayout();
  createCanvas(windowWidth, canvasH);
  imageMode(CORNER);
  const totalCells = GRID_COLS * GRID_ROWS;
  // Load images asynchronously — sketch runs immediately, images appear as ready
  for (let i = 0; i < totalCells; i++) imgs[i] = loadImage(PHOTOS[i]);
  for (let i = 0; i < totalCells; i++) hoverT[i] = 0;
  const totalPlus = (GRID_COLS + 1) * (GRID_ROWS + 1);
  for (let i = 0; i < totalPlus; i++) {
    plusRotT[i]     = 0;
    plusSpinProg[i] = 1; // 1 = done, so no spin plays on first load
    plusSpinStart[i] = 0;
  }

  // Floating stripes
  initStripes();
  positionUI();

  // Staggered fade-in: desktop only — on mobile show all thumbnails instantly
  introStartFrame = new Array(totalCells).fill(0);
  if (windowWidth < 480) {
    introProgress = new Array(totalCells).fill(1);
  } else {
    const order = shuffle(Array.from({ length: totalCells }, (_, i) => i));
    introProgress = new Array(totalCells).fill(0);
    for (let rank = 0; rank < totalCells; rank++) {
      introStartFrame[order[rank]] = rank * INTRO_STAGGER;
    }
  }
}

function calcLayout() {
  if      (windowWidth <  480)  cols = 4;
  else if (windowWidth <  768)  cols = 7;
  else if (windowWidth < 1024)  cols = 10;
  else                          cols = GRID_COLS;

  if (windowWidth < 480) {
    // Scale cells to fill mobile screen width with side margins
    const margin = 12; // px on each side
    eGap      = 6;
    eCellSize = floor((windowWidth - margin * 2 - (cols + 1) * eGap) / cols);
  } else {
    eCellSize = CELL_SIZE;
    eGap      = GAP;
  }

  const totalPhotos = GRID_COLS * GRID_ROWS;
  rows = ceil(totalPhotos / cols);

  const gridH    = rows * (eCellSize + eGap) + eGap;
  const topPad   = windowWidth < 480 ? 60 : 0; // space below fixed nav on mobile
  canvasH        = max(windowHeight, gridH + eGap * 2 + topPad);
  gridOffsetY    = topPad + floor((canvasH - topPad - gridH) / 2);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  clear(); // transparent canvas — map shows through gaps between photos

  // Advance intro animation (desktop only — mobile thumbnails are pre-set to 1)
  const n = GRID_COLS * GRID_ROWS;
  if (windowWidth >= 480) {
    for (let i = 0; i < n; i++) {
      if (frameCount >= introStartFrame[i]) {
        introProgress[i] = min(1, (frameCount - introStartFrame[i]) / INTRO_DURATION);
      }
    }
  }

  // Fisheye hover — desktop only (mobile has no cursor and doesn't need the cost)
  if (windowWidth >= 480) {
    for (let i = 0; i < n; i++) {
      const { x, y } = cellPos(i);
      const cx = x + eCellSize / 2;
      const cy = y + eCellSize / 2;
      const d  = dist(mouseX, mouseY, cx, cy);
      const raw    = max(0, 1 - d / HOVER_RADIUS);
      const target = raw * raw;
      hoverT[i] = lerp(hoverT[i], target, 0.14);
    }
  }

  // Draw grid separators first (behind images)
  drawMarkers();

  // Draw photos
  for (let i = 0; i < n; i++) drawThumb(i);

  // Floating stripes
  for (const s of stripes) { s.update(); s.draw(); }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].update();
    ripples[i].draw();
    if (ripples[i].dead()) ripples.splice(i, 1);
  }

  // Lightbox on top
  if (lightboxIdx >= 0 || lightboxT > 0.01) drawLightbox();
}

// ─── GRID MARKERS (cyan plus signs between cells) ─────────────────────────────
function drawMarkers() {
  push();
  stroke(MARKER_COL[0], MARKER_COL[1], MARKER_COL[2], 80);
  strokeWeight(1);

  const totalW  = cols * (eCellSize + eGap);
  const offsetX = floor((windowWidth - totalW) / 2) + eGap;

  // Each cell contributes its hoverT to its 4 corner plusses.
  // A plus shared by multiple cells takes the strongest influence.
  const totalCells  = GRID_COLS * GRID_ROWS;
  const plusCount   = (GRID_COLS + 1) * (GRID_ROWS + 1);
  const plusTarget  = new Float32Array(plusCount);
  for (let i = 0; i < totalCells; i++) {
    if (hoverT[i] < 0.01) continue;
    const hCol = i % GRID_COLS;
    const hRow = floor(i / GRID_COLS);
    const corners = [
       hRow      * (GRID_COLS + 1) + hCol,
       hRow      * (GRID_COLS + 1) + hCol + 1,
      (hRow + 1) * (GRID_COLS + 1) + hCol,
      (hRow + 1) * (GRID_COLS + 1) + hCol + 1,
    ];
    for (const c of corners) plusTarget[c] = max(plusTarget[c], hoverT[i]);
  }

  // Draw every plus with its driven rotation
  for (let row = 0; row <= rows; row++) {
    for (let col = 0; col <= cols; col++) {
      const mx  = offsetX + col * (eCellSize + eGap) - eGap / 2;
      const my  = gridOffsetY + eGap + row * (eCellSize + eGap) - eGap / 2;
      const idx = row * (GRID_COLS + 1) + col;
      plusRotT[idx] = lerp(plusRotT[idx], plusTarget[idx], 0.14);
      // Advance spin animation
      if (plusSpinProg[idx] < 1 && frameCount >= plusSpinStart[idx]) {
        plusSpinProg[idx] = min(1, (frameCount - plusSpinStart[idx]) / PLUS_SPIN_DUR);
      }
      const spinAngle = easeInOutCubic(plusSpinProg[idx]) * TWO_PI * 2; // 2 full turns
      plusSign(mx, my, plusRotT[idx] * PI / 2 + spinAngle);
    }
  }
  pop();
}

function plusSign(x, y, rot = 0) {
  push();
  translate(x, y);
  rotate(rot);
  line(-PLUS_SIZE, 0, PLUS_SIZE, 0); // horizontal arm
  line(0, -PLUS_SIZE, 0, PLUS_SIZE); // vertical arm
  pop();
}

// ─── THUMBNAIL ────────────────────────────────────────────────────────────────
function drawThumb(i) {
  const p = introProgress[i];
  if (p <= 0) return;

  const { x, y } = cellPos(i);
  const t     = hoverT[i];
  const alpha = min(1, p) * 255;
  const sc    = 1 + t * HOVER_MAX;
  const ox    = (eCellSize * (sc - 1)) / 2;
  const oy    = (eCellSize * (sc - 1)) / 2;

  push();
  if (imgs[i] && imgs[i].width > 0) {
    tint(255, alpha);
    image(imgs[i], x - ox, y - oy, eCellSize * sc, eCellSize * sc);
    noTint();
  } else {
    fill(220, alpha);
    noStroke();
    rect(x - ox, y - oy, eCellSize * sc, eCellSize * sc);
  }

  // Thin cyan border on hover
  if (t > 0.05) {
    noFill();
    stroke(MARKER_COL[0], MARKER_COL[1], MARKER_COL[2], t * 220);
    strokeWeight(1.5);
    rect(x - ox, y - oy, eCellSize * sc, eCellSize * sc);
  }
  pop();
}

// Smooth acceleration + deceleration
function easeInOutCubic(t) {
  if (t <= 0) return 0; if (t >= 1) return 1;
  return t < 0.5 ? 4 * t * t * t : 1 - pow(-2 * t + 2, 3) / 2;
}

// Overshoot spring: shoots past 1 then snaps back
function easeOutBack(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  if (t < 0.6) return map(t, 0, 0.6, 0, 1.25);
  return map(t, 0.6, 1.0, 1.25, 1.0);
}

function calcLightboxSz() {
  const pad = 40;
  if (windowWidth < 768) {
    return min(windowWidth - pad * 2, windowHeight - pad * 2, windowWidth * 0.88);
  }
  // Desktop: cap at 600px so image never overwhelms the grid
  return min(windowWidth - pad * 2, windowHeight - pad * 2, windowWidth * 0.38, 600);
}

// ─── LIGHTBOX ─────────────────────────────────────────────────────────────────
function drawLightbox() {
  const target = lightboxIdx >= 0 ? 1 : 0;
  if (windowWidth < 480) {
    lightboxT = target; // instant open/close on mobile
  } else {
    lightboxT = lerp(lightboxT, target, 0.14);
  }
  if (lightboxIdx >= 0) lightboxBarT = min(1, lightboxBarT + 0.09);
  else lightboxBarT = 0;
  if (lightboxT < 0.02) return;

  const idx = lightboxIdx >= 0 ? lightboxIdx : lastLightboxIdx;

  push();
  fill(255, 255, 255, lightboxT * 230);
  noStroke();
  rect(0, scrollY, windowWidth, windowHeight);

  const sz = lightboxSz;
  const px = (windowWidth  - sz) / 2;
  const py = scrollY + (windowHeight - sz) / 2;

  if (imgs[idx] && imgs[idx].width > 1) {
    if (windowWidth >= 480) {
      drawingContext.shadowOffsetX = 0;
      drawingContext.shadowOffsetY = 12 * lightboxT;
      drawingContext.shadowBlur    = 24 * lightboxT;
      drawingContext.shadowColor   = `rgba(0,0,0,${0.15 * lightboxT})`;
    }
    if (windowWidth >= 480) tint(255, lightboxT * 255);
    image(imgs[idx], px, py, sz, sz);
    noTint();
    drawingContext.shadowOffsetX = 0;
    drawingContext.shadowOffsetY = 0;
    drawingContext.shadowBlur    = 0;
    drawingContext.shadowColor   = 'rgba(0,0,0,0)';

    // Overlay: second image revealed through random vertical bars (clipping mask)
    if (lightboxOverlayIdx >= 0 && imgs[lightboxOverlayIdx] &&
        imgs[lightboxOverlayIdx].width > 1 && lightboxBars.length > 0) {
      drawingContext.shadowBlur = 0;
      // Draw gradient drop shadows in sync with bar reveal animation
      const shadowBarEase = easeInOutCubic(lightboxBarT);
      const shadowW = 4;
      for (const bar of lightboxBars) {
        const cx = px + bar.x + bar.w * 0.5;
        const halfW = bar.w * 0.5 * shadowBarEase;
        const rightEdge = cx + halfW;
        const grd = drawingContext.createLinearGradient(rightEdge, 0, rightEdge + shadowW, 0);
        grd.addColorStop(0, `rgba(0,0,0,${0.05 * lightboxT})`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        drawingContext.fillStyle = grd;
        drawingContext.fillRect(rightEdge, py, shadowW, sz);
      }

      // Now draw the overlay image clipped to the bars (bars animate in from center horizontally)
      const barEase = easeInOutCubic(lightboxBarT);
      drawingContext.save();
      drawingContext.beginPath();
      for (const bar of lightboxBars) {
        const cx = px + bar.x + bar.w * 0.5;
        const halfW = bar.w * 0.5 * barEase;
        drawingContext.rect(cx - halfW, py, halfW * 2, sz);
      }
      drawingContext.clip();
      tint(255, lightboxT * 255);
      image(imgs[lightboxOverlayIdx], px, py, sz, sz);
      noTint();
      drawingContext.restore();
    }


    // Thin cyan frame
    noFill();
    stroke(MARKER_COL[0], MARKER_COL[1], MARKER_COL[2], lightboxT * 180);
    strokeWeight(1.5);
    rect(px, py, sz, sz);
  }

  if (lightboxT > 0.8) {
    const fadeA = (lightboxT - 0.8) / 0.2;
    textFont('Inconsolata');
    textSize(12);
    textStyle(NORMAL);
    noStroke();
    fill(MARKER_COL[0], MARKER_COL[1], MARKER_COL[2], fadeA * 180);
    textAlign(CENTER, BOTTOM);
    text("[SPACEBAR TO LOAD RANDOM IMAGE]", width / 2, py - 14);
    text("[CLICK ANYWHERE TO CLOSE]", width / 2, py + sz + 28);
  }
  pop();
}

let lastLightboxIdx    = 0;
let lightboxOverlayIdx = -1; // second randomly chosen image drawn on top
let lightboxBars       = []; // vertical bar mask: [{x, w}] offsets from image left edge
let lightboxBarT       = 0;  // 0→1 bar reveal animation progress
let lightboxSz         = 400; // computed size — shared between generation and drawing

// ─── INPUT ────────────────────────────────────────────────────────────────────
function keyPressed() {
  if (key === ' ' && lightboxIdx >= 0) {
    // Pick a new random overlay image
    let oi = floor(random(PHOTOS.length));
    if (oi === lightboxIdx) oi = (oi + 1) % PHOTOS.length;
    lightboxOverlayIdx = oi;
    // Regenerate bars — slot-based so they spread across the full zone
    lightboxSz = calcLightboxSz();
    const sz = lightboxSz;
    lightboxBars = [];
    const barZoneStart = sz * 0.15;
    const barZoneEnd   = sz * 0.85;
    const numBars = floor(random(5, 11)); // 5–10 bars spread across zone
    const slotW = (barZoneEnd - barZoneStart) / numBars;
    for (let i = 0; i < numBars; i++) {
      const barW  = random(3, 28);
      const slotX = barZoneStart + i * slotW;
      const x     = random(slotX, slotX + slotW - barW);
      lightboxBars.push({ x, w: barW });
    }
    lightboxBarT = 0;
    return false; // prevent page scroll
  }
}

function handlePress(px, py) {
  if (document.getElementById('intro').classList.contains('visible')) return;
  if (lightboxIdx >= 0) {
    lastLightboxIdx = lightboxIdx;
    lightboxIdx = -1;
    return;
  }

  for (let i = 0; i < PHOTOS.length; i++) {
    const { x, y } = cellPos(i);
    if (px > x && px < x + eCellSize &&
        py > y && py < y + eCellSize) {
      lightboxIdx = i;
      lastLightboxIdx = i;
      // Pick a different random image for the overlay
      let oi = floor(random(PHOTOS.length));
      if (oi === i) oi = (oi + 1) % PHOTOS.length;
      lightboxOverlayIdx = oi;

      // Build random vertical bar mask — slot-based so they spread across the full zone
      lightboxSz = calcLightboxSz();
      const sz = lightboxSz;
      lightboxBars = [];
      const barZoneStart = sz * 0.15;
      const barZoneEnd   = sz * 0.85;
      const numBars = floor(random(5, 11)); // 5–10 bars spread across zone
      const slotW = (barZoneEnd - barZoneStart) / numBars;
      for (let i = 0; i < numBars; i++) {
        const barW  = random(3, 28);
        const slotX = barZoneStart + i * slotW;
        const x     = random(slotX, slotX + slotW - barW);
        lightboxBars.push({ x, w: barW });
      }
      lightboxBarT = 0;
      for (let k = 0; k < 4; k++) ripples.push(new Ripple(px, py));
      return;
    }
  }

  // Click on empty space → ripple
  for (let k = 0; k < 3; k++) ripples.push(new Ripple(px, py));
}

function mousePressed() {
  handlePress(mouseX, mouseY);
}

let _tapStartX = 0, _tapStartY = 0, _tapLastX = 0, _tapLastY = 0;

function touchStarted() {
  if (touches.length > 0) {
    _tapStartX = _tapLastX = touches[0].x;
    _tapStartY = _tapLastY = touches[0].y;
  }
  return true; // allow default scroll behavior
}

function touchMoved() {
  if (touches.length > 0) {
    _tapLastX = touches[0].x;
    _tapLastY = touches[0].y;
  }
  return true; // allow scroll
}

function touchEnded() {
  // Only handle on real touch devices — ignore trackpad touch events on desktop
  if (navigator.maxTouchPoints === 0) return true;
  if (document.getElementById('intro').classList.contains('visible')) return true;
  const dx = _tapLastX - _tapStartX;
  const dy = _tapLastY - _tapStartY;
  if (sqrt(dx * dx + dy * dy) < 12) {
    handlePress(_tapStartX, _tapStartY);
  }
  return true;
}

function windowResized() {
  calcLayout();
  resizeCanvas(windowWidth, canvasH);
  initStripes();
  positionUI();
}

function positionUI() {
  const totalW  = cols * (eCellSize + eGap);
  const offsetX = floor((windowWidth - totalW) / 2) + eGap;
  // Centre vertically in the gap row above the first thumbnail row
  const offsetY = gridOffsetY + floor(eGap / 2) - 24;
  const ui = document.getElementById('ui');
  ui.style.left      = offsetX + 'px';
  ui.style.top       = offsetY + 'px';
  ui.style.transform = 'translateY(-50%)';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function cellPos(i) {
  const totalW  = cols * (eCellSize + eGap);
  const offsetX = floor((windowWidth - totalW) / 2) + eGap;
  const col = i % cols;
  const row = floor(i / cols);
  return {
    x: offsetX + col * (eCellSize + eGap),
    y: gridOffsetY + eGap + row * (eCellSize + eGap),
  };
}

function generatePlaceholders(n) {
  // Uses picsum.photos with unique seeds so each looks different.
  // Replace this entire array with your own photo paths when ready.
  return Array.from({ length: n }, (_, i) =>
    `https://picsum.photos/seed/${i * 7 + 11}/200/200`
  );
}

// ─── STRIPES ──────────────────────────────────────────────────────────────────
const STRIPE_COUNT = 120; // reduced in initStripes() on mobile
let stripes = [];

class Stripe {
  constructor(spawnAnywhere = false) {
    this.init(spawnAnywhere);
  }

  init(spawnAnywhere = false) {
    this.w     = random(1, CELL_SIZE);
    this.h     = CELL_SIZE;
    // Snap y to a random grid row so stripes align with thumbnails
    const row  = floor(random(rows));
    this.y     = gridOffsetY + eGap + row * (eCellSize + eGap);
    this.speed = random(0.1, 0.6) * (random() < 0.5 ? 1 : -1);
    // Start off the correct edge, or anywhere on first load
    this.x     = spawnAnywhere
      ? random(-this.w, windowWidth)
      : (this.speed > 0 ? -this.w : windowWidth);
    this.r     = random(255);
    this.g     = random(255);
    this.b     = random(255);
    this.alpha = random(30, 110);
  }

  update() {
    this.x += this.speed;
    if (this.x > windowWidth + 120 || this.x < -120) this.init();
  }

  draw() {
    push();
    noStroke();
    fill(this.r, this.g, this.b, this.alpha);
    rect(this.x, this.y, this.w, this.h);
    pop();
  }
}

function initStripes() {
  stripes = [];
  const count = windowWidth < 480 ? 40 : STRIPE_COUNT;
  for (let i = 0; i < count; i++) stripes.push(new Stripe(true));
}

// ─── RIPPLE ───────────────────────────────────────────────────────────────────
class Ripple {
  constructor(x, y) {
    this.x    = x;
    this.y    = y;
    this.r    = 4;
    this.maxR = random(60, 160);
    this.spd  = random(2, 4);
    this.a    = 180;
  }
  update() {
    this.r += this.spd;
    this.a  = map(this.r, 0, this.maxR, 180, 0);
  }
  draw() {
    push();
    noFill();
    stroke(MARKER_COL[0], MARKER_COL[1], MARKER_COL[2], this.a);
    strokeWeight(map(this.r, 0, this.maxR, 1.5, 0.3));
    rectMode(CENTER);
    rect(this.x, this.y, this.r * 2, this.r * 2);
    pop();
  }
  dead() { return this.r >= this.maxR; }
}

// ─── RANDOMIZE ────────────────────────────────────────────────────────────────
function randomizeGrid() {
  // Spin all plus signs — diagonal wave from top-left to bottom-right
  for (let row = 0; row <= GRID_ROWS; row++) {
    for (let col = 0; col <= GRID_COLS; col++) {
      const idx = row * (GRID_COLS + 1) + col;
      plusSpinStart[idx] = frameCount + (col + row) * PLUS_SPIN_STAGGER;
      plusSpinProg[idx]  = 0;
    }
  }

  PHOTOS = ALL_IMAGES.slice().sort(() => Math.random() - 0.5).slice(0, GRID_COLS * GRID_ROWS);
  const totalCells = GRID_COLS * GRID_ROWS;

  // Reload images
  for (let i = 0; i < totalCells; i++) {
    imgs[i] = loadImage(PHOTOS[i]);
  }

  // Re-trigger fade-in (desktop only — show instantly on mobile)
  if (windowWidth < 480) {
    introProgress.fill(1);
  } else {
    const order = shuffle(Array.from({ length: totalCells }, (_, i) => i));
    for (let rank = 0; rank < totalCells; rank++) {
      introStartFrame[order[rank]] = frameCount + rank * INTRO_STAGGER;
      introProgress[order[rank]]   = 0;
    }
  }
}

// ─── INTRO OVERLAY ────────────────────────────────────────────────────────────
const INTRO_SENTENCES = [
  "Detroit holds 122,000 open lots and thousands of solitary structures across its 140+ square miles of shifting urban landscape.",
  "Matthew Raupp has captured these quiet transitions in an interactive experience drawing from thousands of his photographs.",
  "Each click randomly juxtaposes two images to create a new study of the periphery and a meditation on the spaces in between."
];

(function initIntro() {
  const overlay  = document.getElementById('intro');
  const textEl   = document.getElementById('intro-text');
  const nextBtn  = document.getElementById('intro-next');
  const prevBtn  = document.getElementById('intro-prev');
  const skipBtn  = document.getElementById('intro-skip');
  const dotsEl   = document.getElementById('intro-dots');
  let current    = 0;

  // Build dots
  INTRO_SENTENCES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'intro-dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });

  function updateDots() {
    dotsEl.querySelectorAll('.intro-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  function updateButtons() {
    prevBtn.classList.toggle('ghosted', current === 0);
    nextBtn.textContent = current < INTRO_SENTENCES.length - 1 ? '[NEXT]' : '[ENTER]';
  }

  function showSentence(idx) {
    textEl.classList.add('fade');
    setTimeout(() => {
      textEl.textContent = INTRO_SENTENCES[idx];
      updateDots();
      updateButtons();
      textEl.classList.remove('fade');
    }, 400);
  }

  // Wait for most images to load, then fade in the overlay after a short pause
  function checkImgsLoaded() {
    const loaded = imgs.filter(img => img && img.width > 1).length;
    const threshold = Math.floor(imgs.length * 0.8);
    if (loaded >= threshold) {
      setTimeout(() => overlay.classList.add('visible'), 600);
    } else {
      setTimeout(checkImgsLoaded, 150);
    }
  }
  // imgs array is populated after setup(), so wait a tick before polling
  setTimeout(checkImgsLoaded, 200);

  // Show first sentence immediately (overlay is invisible until triggered)
  textEl.textContent = INTRO_SENTENCES[0];
  updateButtons();

  window.showIntro = function() {
    current = 0;
    textEl.textContent = INTRO_SENTENCES[0];
    updateDots();
    updateButtons();
    overlay.classList.remove('hidden');
    overlay.classList.add('visible');
  };

  prevBtn.addEventListener('click', () => {
    if (current > 0) {
      current--;
      showSentence(current);
    }
  });

  function dismissIntro() {
    overlay.classList.add('hidden');
    overlay.classList.remove('visible');
  }

  nextBtn.addEventListener('click', () => {
    if (current < INTRO_SENTENCES.length - 1) {
      current++;
      showSentence(current);
    } else {
      dismissIntro();
    }
  });

  skipBtn.addEventListener('click', () => {
    dismissIntro();
  });
})();
</script>
